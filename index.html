<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AES-256 加解密工具</title>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<style>
  *{
    box-sizing:border-box;
    font-family:system-ui, -apple-system, sans-serif;
  }
  body{
    background:#111827;
    color:#e5e7eb;
    max-width:800px;
    margin:0 auto;
    padding:20px;
  }
  .card{
    background:#1f2937;
    border-radius:12px;
    padding:20px;
    margin-bottom:16px;
  }
  h1{
    text-align:center;
    margin-top:0;
    font-size:24px;
  }
  label{
    display:block;
    margin:8px 0 4px;
    font-weight:bold;
  }
  textarea,input{
    width:100%;
    padding:10px 12px;
    border-radius:6px;
    border:none;
    background:#374151;
    color:#fff;
    font-size:16px;
    resize:vertical;
  }
  .btn-group{
    display:flex;
    gap:10px;
    margin:12px 0;
  }
  button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
  }
  .btn-encrypt{
    background:#10b981;
    color:white;
  }
  .btn-decrypt{
    background:#3b82f6;
    color:white;
  }
  .tip{
    font-size:14px;
    color:#9ca3af;
    margin-top:4px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>AES-256 加解密工具</h1>

  <label>密钥（密码）</label>
  <input type="text" id="key" placeholder="请输入密钥，至少 8 位" />

  <label>明文 / 待加密内容</label>
  <textarea id="plain" rows="5" placeholder="输入要加密的文字"></textarea>

  <label>密文 / 待解密内容</label>
  <textarea id="cipher" rows="5" placeholder="输入要解密的字符串"></textarea>

  <div class="btn-group">
    <button class="btn-encrypt" onclick="encrypt()">加密</button>
    <button class="btn-decrypt" onclick="decrypt()">解密</button>
  </div>

  <div class="tip">
    所有运算在本地完成，不会上传任何数据。
  </div>
</div>

<script>
// AES-256 加密
function encrypt() {
  const key = document.getElementById('key').value.trim();
  const plain = document.getElementById('plain').value.trim();

  if (!key || !plain) {
    alert('请输入密钥和明文');
    return;
  }

  try {
    const encrypted = CryptoJS.AES.encrypt(
      plain,
      key
    ).toString();
    document.getElementById('cipher').value = encrypted;
  } catch (e) {
    alert('加密失败：' + e.message);
  }
}

// AES-256 解密
function decrypt() {
  const key = document.getElementById('key').value.trim();
  const cipher = document.getElementById('cipher').value.trim();

  if (!key || !cipher) {
    alert('请输入密钥和密文');
    return;
  }

  try {
    const decrypted = CryptoJS.AES.decrypt(cipher, key);
    const plainText = decrypted.toString(CryptoJS.enc.Utf8);

    if (!plainText) {
      alert('解密失败：密钥错误或密文被篡改');
      return;
    }

    document.getElementById('plain').value = plainText;
  } catch (e) {
    alert('解密失败：' + e.message);
  }
}
</script>
</body>
</html>
