<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>简易聊天室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Microsoft YaHei,sans-serif}
body{background:#f5f5f5;padding:20px}
.login-box,.chat-box{max-width:500px;margin:0 auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
.login-box h2{margin-bottom:15px;text-align:center}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:5px}
button{padding:10px 15px;background:#009688;color:white;border:none;border-radius:5px;cursor:pointer;margin-top:5px}
button:hover{background:#00796b}
.chat-box{display:flex;flex-direction:column;height:80vh}
.chat-main{flex:1;overflow-y:auto;padding:10px;background:#f9f9f9;border-radius:5px;margin-bottom:10px}
.msg{margin:8px 0;padding:8px 12px;border-radius:8px;max-width:70%;position:relative}
.msg-me{background:#d1e7ff;margin-left:auto;text-align:right}
.msg-other{background:#e2e2e2;margin-right:auto}
.msg .time{font-size:12px;color:#666}
.msg .del{font-size:12px;color:#f44336;margin-left:8px;cursor:pointer}
.send-box{display:flex;gap:10px}
.send-box input{flex:1;margin:0}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>进入聊天室</h2>
  <input type="text" id="username" placeholder="请创建你的账号（昵称）">
  <input type="password" id="password" placeholder="请输入进门密码">
  <button onclick="login()">进入聊天</button>
</div>

<div class="chat-box" id="chatBox" style="display:none">
  <div id="chatMain" class="chat-main"></div>
  <div class="send-box">
    <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.keyCode==13)send()">
    <button onclick="send()">发送</button>
  </div>
</div>

<script>
let user = localStorage.getItem("chatUser") || "";
const PASS = "3xing";

if(user){
  showChat();
}

function login(){
  let u = document.getElementById("username").value.trim();
  let p = document.getElementById("password").value.trim();
  if(!u){alert("请输入账号");return}
  if(p !== PASS){alert("密码错误");return}
  user = u;
  localStorage.setItem("chatUser", user);
  showChat();
}

function showChat(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("chatBox").style.display = "flex";
  loadMsg();
}

function getMsgs(){
  let m = localStorage.getItem("chatData");
  return m ? JSON.parse(m) : [];
}

function saveMsgs(msgs){
  localStorage.setItem("chatData", JSON.stringify(msgs));
}

function loadMsg(){
  let list = getMsgs();
  let html = "";
  list.forEach((item,i)=>{
    let cls = item.user === user ? "msg msg-me" : "msg msg-other";
    let del = item.user === user ? `<span class="del" onclick="delMsg(${i})">撤回</span>` : "";
    html += `<div class="${cls}">${item.msg}<span class="time">${item.user}</span>${del}</div>`;
  });
  document.getElementById("chatMain").innerHTML = html;
  document.getElementById("chatMain").scrollTop = 99999;
}

function send(){
  let txt = document.getElementById("msgInput").value.trim();
  if(!txt)return;
  let list = getMsgs();
  list.push({user:user, msg:txt});
  saveMsgs(list);
  document.getElementById("msgInput").value = "";
  loadMsg();
}

function delMsg(index){
  let list = getMsgs();
  list.splice(index,1);
  saveMsgs(list);
  loadMsg();
}
</script>
</body>
</html>
